name: flashmind_mobile
description: A new Flutter project for Flashcards.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  
  # State Management
  provider: ^6.1.5+1
  
  # HTTP Client
  dio: ^5.9.2
  
  # Navigation
  go_router: ^17.2.3
  
  # Secure Storage for JWT
  flutter_secure_storage: ^10.2.0
  
  # Local Storage & Offline
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^7.1.1
  
  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1
  
  # UI & Utilities
  google_fonts: ^6.1.0
  intl: ^0.19.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
